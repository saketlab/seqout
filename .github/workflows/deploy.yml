name: Deploy Frontend

on:
  push:
    branches:
      - main
      - master

jobs:
  build_and_deploy:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build standalone frontend
        run: npm run build

      - name: Prepare standalone package
        run: |
          mkdir -p deploy

          cp -r .next/standalone/* deploy/

          mkdir -p deploy/.next
          cp -r .next/static deploy/.next/static

          cp -r public deploy/public

      - name: Prepare deployment directory on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 22
          script: |
            mkdir -p /var/www/sramap/frontend

      - name: Upload standalone frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 22
          source: "deploy/*"
          target: /var/www/sramap/frontend
          strip_components: 1

      - name: Restart frontend service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 22
          script: |
            set -e

            sudo systemctl restart sramap-frontend

            sleep 5

            curl -f http://127.0.0.1:3002

            echo "Frontend deployment successful"